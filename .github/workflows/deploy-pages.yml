name: Deploy Frontend to GitHub Pages

# 任何推送到 main 都会重新发布前端
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "admin/**"
      - "assets/**"
      - "data/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Package site (frontend only — worker/ is not uploaded)
        run: |
          mkdir _site
          cp index.html _site/
          cp -r admin _site/
          cp -r assets _site/
          cp -r data _site/
          # SPA-ish 404 fallback — GitHub Pages will serve this for unknown paths
          cp index.html _site/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
